name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Add demo video from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download v0.5.0 --repo liush2yuxjtu/my-agent-sdk --pattern 'my-agent-sdk-pi-session-*.webm' --dir artifacts --clobber
      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts
      - id: deployment
        uses: actions/deploy-pages@v4
